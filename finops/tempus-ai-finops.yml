description: >-
  FinOps view of Tempus AI spend. Tempus does not offer a public, usage-metered
  developer API, so there are no per-call / per-token cloud-style meters to
  manage. Costs arise instead from enterprise and partner agreements: clinical
  genomic / molecular testing billed through order workflows and payers,
  life-sciences licensing of the Lens data and AI platform, and contracted
  provider tools (Hub, One, Next) plus EHR integration. Cost management is
  governed by contract terms rather than API consumption telemetry.
notes: >-
  No usage-based API billing is published. Populate FOCUS meters only if Tempus
  launches a documented public, metered API. Until then, financial governance
  is contract-based.
