principles:
- name: Visibility
  description: No public API usage telemetry exists; track spend via enterprise invoices and contract line items.
- name: Allocation
  description: Map Tempus testing, Lens licensing, and provider-tool costs to programs / cost centers per contract.
- name: Optimization
  description: Optimization is negotiated at the agreement level (volume commitments, scope), not via API tier selection.
- name: Accountability
  description: Assign contract owners; review enterprise spend against budget on the invoicing cadence.
