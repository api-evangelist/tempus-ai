description: >-
  Tempus AI does not publish public, self-serve API pricing. Its offerings are
  sold through enterprise, life-sciences, and healthcare-provider channels:
  genomic and molecular tests (e.g. xT / xR) are billed clinically through
  payers and order workflows, the Lens real-world-data and AI platform is
  licensed to biopharma under enterprise agreements, and clinical tools (Hub,
  One, Next) are provisioned to health systems via contract and EHR
  integration. There are no published Free / Developer / Pay-as-you-go API
  tiers because no public API is offered.
notes: >-
  Access and commercial terms are negotiated directly with Tempus sales /
  partnerships. No per-call, per-token, or subscription API pricing is publicly
  documented. Reconcile only if Tempus launches a documented public API with
  published rates.
sources:
- https://www.tempus.com/
- https://www.tempus.com/life-sciences/lens/
- https://www.tempus.com/oncology/ehr-integration/
- https://www.tempus.com/order/
plans:
- id: tempus-ai-enterprise
  name: Enterprise / Partner
  type: enterprise
  description: >-
