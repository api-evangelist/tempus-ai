aid: tempus-ai
url: https://raw.githubusercontent.com/api-evangelist/tempus-ai/refs/heads/main/apis.yml
name: Tempus AI
kind: company
description: >-
  Tempus AI (NASDAQ: TEM) is a precision medicine company that has built
  one of the world's largest libraries of de-identified clinical and molecular data,
  paired with an operating system to make that data accessible for diagnostics and
  research, starting with cancer. Its products span genomic profiling (xT / xR),
  AI-enabled clinical tools (Hub, One, Next), the Lens real-world data and agentic
  AI platform for life sciences, cardiology and radiology AI (ECG-AI, Pixel), and a
  consumer health app (Olivia). Tempus does not currently publish a self-serve,
  documented public developer API; integrations are delivered through enterprise and
  EHR channels (HL7 / FHIR, e.g. Epic) under partner agreements.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Precision Medicine
- Genomics
- Healthcare
- Molecular Diagnostics
- Oncology
- Real-World Data
- AI
